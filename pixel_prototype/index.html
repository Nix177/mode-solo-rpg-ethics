<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Observatoire RPG</title>
    <link rel="stylesheet" href="style.css?v=20260209k">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- UI Layer -->
        <div id="ui-layer">
            <div id="level-info">Level: <span id="level-id">1</span>
                <!-- Language Selector -->
                <select id="language-select" onchange="window.changeLanguage(this.value)"
                    style="margin-left: 10px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #555; padding: 2px; border-radius: 4px; font-size: 12px; pointer-events: auto;">
                    <option value="fr">FR</option>
                    <option value="en">EN</option>
                    <option value="de">DE</option>
                </select>
            </div>


            <!-- Dialog Box (Hidden by default) -->
            <div id="dialog-box" class="hidden">
                <div id="dialog-name">Name</div>
                <div id="dialog-text">...</div>
                <div id="dialog-hint">[SPACE] to continue</div>
            </div>

            <!-- Choice Overlay (Hidden by default) -->
            <div id="choice-overlay" class="hidden">
                <h2>MAKE YOUR CHOICE</h2>
                <div id="choice-container">
                    <!-- Buttons injected via JS -->
                </div>
            </div>

            <!-- Interaction Prompt -->
            <div id="interaction-prompt" class="hidden">
                [E] Interagir
            </div>

            <!-- Minigame Overlay (Hidden by default) -->
            <div id="minigame-overlay" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; pointer-events: none; display: flex; align-items: center; justify-content: center;">
                <div id="minigame-container" style="background: rgba(10, 10, 20, 0.95); border: 2px solid var(--term-green, #0f0); padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); text-align: center; max-width: 400px; font-family: 'Courier New', monospace; pointer-events: auto; color: #fff;">
                    <h3 id="minigame-title" style="margin-top: 0; color: #0f0; text-transform: uppercase;">Sécurité</h3>
                    <p id="minigame-desc" style="font-size: 14px; margin-bottom: 20px;">...</p>
                    <div id="minigame-content" style="margin-bottom: 20px; min-height: 50px; display:flex; flex-direction: column; align-items:center; justify-content:center;">
                        <!-- Minigame specifics injected here -->
                    </div>
                    <div id="minigame-timer" style="font-weight: bold; color: #f00;">10.0s</div>
                </div>
            </div>

            <!-- Player Selection Overlay -->
            <div id="player-selection-overlay" class="hidden">
                <div class="selection-modal">
                    <h2>CHOISISSEZ VOTRE MEDIATEUR</h2>
                    <div id="presets-grid">
                        <!-- Filled by JS -->
                    </div>
                    <button id="start-game-btn" disabled>COMMENCER LA SIMULATION</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="game.js?v=rollback_fix_2"></script>
</body>

</html>
