<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Observatoire RPG</title>
    <link rel="stylesheet" href="style.css?v=20260309v4">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="ui-layer">
            <div id="level-info">
                <span>Level: <span id="level-id">1</span></span>
                <span id="pause-hint">[P] Menu</span>
                <div id="top-settings" class="hidden">
                    <select id="language-select" onchange="window.changeLanguage(this.value)">
                        <option value="fr">FR</option>
                        <option value="en">EN</option>
                        <option value="de">DE</option>
                    </select>
                    <div id="audio-controls">
                        <button id="btn-audio-prev">PREV</button>
                        <button id="btn-audio-play">PLAY</button>
                        <button id="btn-audio-next">NEXT</button>
                        <button id="btn-audio-mute">MUTE</button>
                        <input type="range" id="audio-volume" min="0" max="1" step="0.05" value="0.5">
                    </div>
                </div>
            </div>

            <div id="dialog-box" class="hidden">
                <div id="dialog-name">Name</div>
                <div id="dialog-text">...</div>
                <div id="dialog-hint">[SPACE] to continue</div>
            </div>

            <div id="choice-overlay" class="hidden">
                <h2>MAKE YOUR CHOICE</h2>
                <div id="choice-container"></div>
            </div>

            <div id="interaction-prompt" class="hidden">
                [E] Interagir
            </div>

            <div id="player-selection-overlay" class="hidden">
                <div class="selection-modal">
                    <h2>CHOISISSEZ VOTRE MEDIATEUR</h2>
                    <div id="presets-grid"></div>
                    <button id="start-game-btn" disabled>COMMENCER LA SIMULATION</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="game.js?v=20260309v4"></script>
</body>

</html>
